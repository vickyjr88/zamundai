name: Deploy To Server

# Deployment workflow that runs automatically on push to main,
# and can be manually triggered or rerun from the GitHub Actions UI.
#
# Manual trigger: Actions → Deploy To Server → Run workflow
# Rerun deployment: Open failed run → Re-run jobs → Re-run failed jobs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL != '' && secrets.HEALTHCHECK_URL || 'http://127.0.0.1:6100/health' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_PATH,DEPLOY_BRANCH,HEALTHCHECK_URL
          script_stop: true
          script: |
            set -eu

            if [ -z "$DEPLOY_PATH" ]; then
              echo "DEPLOY_PATH secret is required"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            git fetch --all --prune
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            docker compose down
            docker compose up --build -d

            docker compose ps

            docker compose logs --tail=80 --no-color agency-api agency-ui agency-openclaw || true

            if [ -n "${HEALTHCHECK_URL:-}" ]; then
              curl -fsS "$HEALTHCHECK_URL" >/dev/null
              echo "Health check passed: $HEALTHCHECK_URL"
            fi
